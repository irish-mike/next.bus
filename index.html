<!doctype html>
<html class="no-js" lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>next.bus</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <meta name="description" content="Wall dashboard showing the next buses at my stop.">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#0b0e13">
</head>

<body>

  <main class="dashboard">

    <header class="clock">
      <p class="clock-time">
        <span data-js="clock-time">--:--</span><span class="clock-seconds" data-js="clock-seconds">--</span>
      </p>
      <p class="clock-date" data-js="clock-date">&nbsp;</p>
    </header>

    <section class="arrivals">
      <header class="arrivals-header">
        <h1 class="arrivals-title">
          <svg class="arrivals-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8 6v6" />
            <path d="M15 6v6" />
            <path d="M2 12h19.6" />
            <path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3" />
            <circle cx="7" cy="18" r="2" />
            <path d="M9 18h5" />
            <circle cx="16" cy="18" r="2" />
          </svg>
          Next buses
        </h1>
        <p class="arrivals-stop" data-js="stop-name">&nbsp;</p>
      </header>
      <ol class="arrivals-list" data-js="arrivals-list"></ol>
      <p class="arrivals-status" data-js="status">&nbsp;</p>
    </section>

  </main>

  <script src="js/app.js"></script>

</body>

</html>
